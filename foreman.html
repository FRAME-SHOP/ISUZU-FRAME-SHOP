<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foreman Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
:root{--red:#CC0000:#CC0000;--pass:#057A55;--bg:#F5F5F5;--card:#fff;--text:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:var(--CC0000);color:#fff;padding:18px 16px 30px;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo{font-size:18px;font-weight:800;letter-spacing:.06em;}
.user-pill{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.tabs{display:flex;background:var(--card);margin:0 14px;}
.tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);}
.tab.active{color:var(--CC0000);border-bottom-color:var(--CC0000);}
.section{margin:14px 14px 0;}
.sub-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;}
.approve-btn{background:var(--pass);color:#fff;border:none;border-radius:8px;padding:9px 16px;width:100%;font-weight:700;cursor:pointer;margin-top:10px;}
.approved-banner{background:#ECFDF5;color:var(--pass);padding:9px;text-align:center;font-weight:600;border-radius:8px;margin-top:10px;}
.page{display:none;}.page.active{display:block;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--card);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:32px 24px;width:100%;max-width:360px;text-align:center;}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <h2 style="color:var(--CC0000);margin-bottom:20px;">ISUZU Foreman Portal</h2>
    <input id="codeInput" type="text" placeholder="รหัสพนักงาน" style="width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;margin-bottom:15px;text-align:center;">
    <button onclick="doLogin()" style="width:100%;padding:12px;background:var(--CC0000);color:#fff;border:none;border-radius:8px;cursor:pointer;">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="mainScreen" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div class="logo">ISUZU <span>Foreman Portal</span></div>
      <div class="user-pill" onclick="location.reload()">ออก</div>
    </div>
    <div id="fmName" style="font-size:20px;font-weight:800;">—</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-approve" onclick="switchTab('approve')">✅ อนุมัติ</div>
    <div class="tab" id="tab-stations" onclick="switchTab('stations')">📊 Station</div>
  </div>

  <div class="page active" id="page-approve"><div class="section"><div id="approveList"></div></div></div>
  <div class="page" id="station-list"><div class="section"><div id="stationGrid"></div></div></div>
</div>

<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyF-nQ4tO1KWeAIlwtumGYBekLT7plg87xQn31jT1Gl49VQaiIGAg4UBMDv_PRjaJ_1jw/exec";
const FOREMAN_DB = {
  "25019": { name:"นาย สุพัฒน์ คำชนะ", shift:"A", group:"FRC" },
  "05135": { name:"นาย สมพงศ์ พุ่มแก้ว", shift:"A", group:"FRE" },
  "03085": { name:"นาย เสมียน ผลจันทร์", shift:"A", group:"FRF" },
  "04072": { name:"นาย วิหาญ แรมจันทึก", shift:"A", group:"FRL" },
  "04071": { name:"นาย ประกาศ นวนสว่าง", shift:"A", group:"FRR" },
  "90313": { name:"นาย ขจร พาลี", shift:"A", group:"FRU" },
  "04064": { name:"นาย คเชนทร์ ขาวจันทึก", shift:"A", group:"FRX" },
  "05141": { name:"นาย วัฒนา บุรมรัตน์", shift:"A", group:"FXC" },
  "06138": { name:"นาย ประสบ เสาหงษ์", shift:"B", group:"FRC" },
  "05136": { name:"นาย บันลือ หมวดผา", shift:"B", group:"FRE" },
  "06140": { name:"นาย ปัญญา ศรีโพธิ์ชัย", shift:"B", group:"FRF" },
  "96005": { name:"นาย สหวั่น ฦาฤทธิ์", shift:"B", group:"FRL" },
  "97004": { name:"นาย ธงชัย รุ่งโรจน์", shift:"B", group:"FRR" },
  "11075": { name:"นาย วชิระ วงศ์เหล่า", shift:"B", group:"FRU" },
  "90285": { name:"นาย ต้นรัก งามกุลประสิทธิ์", shift:"B", group:"FRX" },
  "94037": { name:"นาย วิบูลย์ อาจหาญ", shift:"B", group:"FXC" },
};

let currentFM = null;

function doLogin(){
  const code = document.getElementById("codeInput").value.trim();
  if(!FOREMAN_DB[code]){ alert("รหัสไม่ถูกต้อง"); return; }
  currentFM = { code, ...FOREMAN_DB[code] };
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";
  document.getElementById("fmName").textContent = currentFM.name;
  syncFromSheets().then(renderAll);
}

async function syncFromSheets(){
  try{
    const r = await fetch(SHEETS_URL+"?t="+Date.now());
    const data = await r.json();
    if(data.rows) localStorage.setItem("isuzu_submissions", JSON.stringify(data.rows.map(r=>JSON.parse(r["JSON เต็ม"])).filter(Boolean)));
  }catch(e){}
}

function getSubs(){ return JSON.parse(localStorage.getItem("isuzu_submissions")||"[]"); }

function renderAll(){
  const list = document.getElementById("approveList");
  const subs = getSubs().filter(s=>s.group===currentFM.group && s.shift===currentFM.shift);
  list.innerHTML = subs.length ? subs.map(s=>`
    <div class="sub-card">
      <div class="sub-title">${s.type_label||s.type} — ${s.stage}</div>
      <div class="sub-meta">${s.worker} | ${s.status}</div>
      ${s.status==="approved" ? `<div class="approved-banner">อนุมัติแล้ว</div>` : `<button class="approve-btn" onclick="approve('${s.id}')">อนุมัติ</button>`}
    </div>`).join("") : "ไม่มีรายการ";
}

function approve(id){
  const all = getSubs();
  const idx = all.findIndex(s=>s.id===id);
  all[idx].status = "approved";
  all[idx].foreman = currentFM.name;
  localStorage.setItem("isuzu_submissions", JSON.stringify(all));
  fetch(SHEETS_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(all[idx])});
  renderAll();
}

function switchTab(t){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.getElementById(t==="stations"?"station-list":"page-"+t).classList.add("active");
  document.getElementById("tab-"+t).classList.add("active");
}

// ระบบอัปเดตอัตโนมัติ
window.addEventListener('focus', () => { if(currentFM) syncFromSheets().then(renderAll); });
setInterval(()=>{ if(currentFM) syncFromSheets().then(renderAll); }, 10000);
</script>
</body>
</html>
