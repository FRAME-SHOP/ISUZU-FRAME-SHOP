<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Worker — ตรวจสอบ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
:root{
  --red:#CC0000;--red-dark:#A00000;--pass:#057A55;--pass-bg:#ECFDF5;--pass-border:#6EE7B7;
  --fail-bg:#FFF5F5;--fail-border:#FFBABA;--warn:#D97706;--warn-bg:#FEF3C7;--warn-border:#FCD34D;
  --bg:#F5F5F5;--card:#fff;--text:#1A1A1A;--muted:#4B5563;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*, *:before, *:after { box-sizing: border-box !important; }
html { width: 100%; max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; padding-bottom: 80px; margin: 0; padding: 0;
  width: 100%; max-width: 100%; overflow-x: hidden; position: relative;
}

.header{background:var(--red);color:#ffffff;padding:16px;width:100%;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
.header-left-title{font-size:18px;font-weight:800;line-height:1.3;white-space:pre-line;}
.header-right-title{font-size:20px;font-weight:800;text-align:right;line-height:1.3;}
.breadcrumb{font-size:16px;font-weight:700;color:#FFE4E6;margin-top:6px;word-break:break-all;}

.init-hero {
  font-size: 16px; font-weight: 800; letter-spacing: 0.05em; color: #ffffff; margin-bottom: 2px;
}
.init-hero-sub {
  font-size: 13px; font-weight: 600; color: #F3F4F6; margin-bottom: 10px; opacity: 0.9;
}
.init-hero-title {
  font-size: 26px; font-weight: 800; color: #ffffff; line-height: 1.2; margin-bottom: 4px;
}
.init-hero-desc {
  font-size: 15px; font-weight: 500; color: #FFE4E6;
}

.section { margin: 16px 12px 0 12px; width: calc(100% - 24px); }
.section-title { font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 10px; }
.grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }

.nav-card{
  background: var(--card); border-radius: 14px; border: 1.5px solid var(--border);
  padding: 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: transform .15s, box-shadow .15s; position: relative; width: 100%;
}
.nav-card:active{transform:scale(.98);}

.nav-card.completed-stage, .nav-card.completed-type { background: var(--pass-bg) !important; border-color: var(--pass-border) !important; }
.nav-card.completed-stage .nav-title, .nav-card.completed-type .nav-title { color: #065F46; }
.nav-card.completed-stage .nav-sub, .nav-card.completed-type .nav-sub { color: #047857; font-weight: 600; }

.nav-card.fail-stage { background: var(--fail-bg) !important; border-color: var(--fail-border) !important; }
.nav-card.fail-stage .nav-title { color: #991B1B; }
.nav-card.fail-stage .nav-sub { color: #B91C1C; font-weight: 600; }

.nav-card.warn-stage { background: var(--warn-bg) !important; border-color: var(--warn-border) !important; }
.nav-card.warn-stage .nav-title { color: #92400E; }
.nav-card.warn-stage .nav-sub { color: #B45309; font-weight: 600; }

.badge-status { font-size: 13px; padding: 4px 10px; border-radius: 6px; font-weight: 700; margin-left: auto; color: #fff; text-align: right; flex-shrink: 0; }
.badge-pass { background: var(--pass); }
.badge-fail { background: var(--red); }
.badge-warn { background: var(--warn); color: #78350F; }

.nav-icon{font-size:30px;flex-shrink:0;}
.nav-info{flex:1;min-width:0;}
.nav-title{font-size:18px;font-weight:800;}
.nav-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.nav-arrow{font-size:22px;color:var(--red);font-weight:700;flex-shrink:0;margin-left:auto;}

.subtype-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 12px;width:calc(100% - 24px);}
.subtype-chip{
  background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:18px 14px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;
  box-shadow:var(--shadow);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.subtype-chip:active{transform:scale(.97);}
.subtype-chip.completed-sub { background: var(--pass-bg) !important; border-color: var(--pass-border) !important; color: #065F46; }
.subtype-chip.fail-sub { background: var(--fail-bg) !important; border-color: var(--fail-border) !important; color: #991B1B; }
.subtype-chip.warn-sub { background: var(--warn-bg) !important; border-color: var(--warn-border) !important; color: #92400E; }

.meta-card{
  background:var(--card); margin:0 12px; border-radius:14px; box-shadow:var(--shadow);
  padding:16px; display:grid !important; grid-template-columns: 1fr 1fr !important;
  gap:12px; border:1px solid var(--border); width:calc(100% - 24px);
}
@media (max-width: 600px) {
  .meta-card { grid-template-columns: 1fr !important; gap: 12px !important; padding: 14px !important; width:calc(100% - 24px) !important; }
}
.meta-item label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px;}
.meta-item input, .meta-item select, .field-card input, .field-card select {
  width: 100% !important; max-width: 100% !important; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px;
  font-family: 'Sarabun', sans-serif; font-size: 16px; background: #F9FAFB; outline: none; color: #0284C7; font-weight: 700;
}

.progress-wrap{margin:14px 12px 0;width:calc(100% - 24px);}
.progress-bg{background:#E5E7EB;border-radius:99px;height:8px;overflow:hidden;width:100%;}
.progress-fill{background:var(--red);height:100%;border-radius:99px;transition:width .3s;width:0%;}
.progress-label{font-size:13px;color:var(--muted);text-align:right;margin-top:4px;font-weight:600;}

.check-list{display:flex;flex-direction:column;gap:10px;width:100%;}
.check-item{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:14px 16px;box-shadow:var(--shadow);width:100%;}
.check-item.pass{border-color:var(--pass-border);background:var(--pass-bg);}
.check-item.fail{border-color:var(--fail-border);background:var(--fail-bg);}
.check-top{display:flex;align-items:flex-start;gap:12px;width:100%;}
.check-num{background:#FFE8E8;color:var(--red);font-size:13px;font-weight:700;border-radius:8px;padding:3px 9px;flex-shrink:0;margin-top:2px;}
.check-info{flex:1;min-width:0;}
.check-name{font-size:16px;font-weight:700;line-height:1.4;}
.check-std{font-size:13px;color:var(--muted);margin-top:3px;}
.toggle-group{display:flex;gap:8px;flex-shrink:0;margin-top:2px;}
.tbtn{width:46px;height:42px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.tbtn.ap{background:var(--pass);border-color:var(--pass);color:#fff;}
.tbtn.af{background:var(--red);border-color:var(--red);color:#fff;}

.comment-row{margin-top:10px;width:100%;}
.comment-row textarea{width:100%;max-width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-family:'Sarabun',sans-serif;font-size:15px;resize:none;outline:none;background:#fff;min-height:60px;}

/* 🛠️ ล็อกกรอบฟิลด์ข้อมูลให้พอดีหน้าจอดันไม่ล้นขอบ */
.field-card{
  background: var(--card); border-radius: 16px; border: 1.5px solid var(--border);
  padding: 16px; box-shadow: var(--shadow); width: 100%; max-width: 100%;
}
.field-card label{display:block;font-size:14px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.field-card input, .field-card select, .field-card textarea{
  width: 100% !important; max-width: 100% !important; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px; font-family: 'Sarabun', sans-serif; font-size: 16px;
  outline: none; background: #F9FAFB; color: #0284C7; font-weight: 700;
}
.field-card select { color: var(--text); font-weight: normal; }
.field-card select:invalid { color: #9CA3AF; }
.field-card textarea{resize:none;min-height:70px;color:var(--text);font-weight:normal;}

.submit-btn{
  width: 100%; max-width: 100%; margin: 18px 0 0 0; background: var(--red); color: #fff;
  border: none; border-radius: 14px; padding: 16px; font-family: 'Sarabun', sans-serif;
  font-size: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(204,0,0,0.3);
}
.submit-btn:hover{background:var(--red-dark);}

.bottom-nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
  border-top: 1.5px solid var(--border); padding: 12px 16px; display: flex; gap: 10px;
  z-index: 99; box-shadow: 0 -4px 16px rgba(0,0,0,.06); width: 100%; max-width: 100%;
}
.bnav-btn {
  flex: 1; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border);
  background: #F3F4F6; color: var(--text); font-family: 'Sarabun', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; text-align: center;
}
.bnav-btn.primary { background: var(--red); color: #fff; border-color: var(--red); }

.success-screen{display:none;padding:40px 20px;text-align:center;width:100%;}
.success-screen.show{display:block;}
.success-icon{font-size:70px;margin-bottom:12px;}
.success-title{font-size:24px;font-weight:800;margin-bottom:6px;}
.success-sub{font-size:15px;color:var(--muted);margin-bottom:28px;}
.success-info{background:#F9FAFB;border-radius:14px;padding:16px;text-align:left;font-size:15px;line-height:2;border:1.5px solid var(--border);margin-bottom:20px;width:100%;}
.reset-btn{width:100%;background:#F3F4F6;color:var(--text);border:none;border-radius:12px;padding:16px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.home-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:16px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:#111827;color:#fff;border-radius:12px;padding:14px 22px;font-size:15px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .3s;z-index:999;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--pass);}.toast.err{background:var(--red);}

.ct-row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:14px 16px;box-shadow:var(--shadow);width:100%;}
.ct-row.ct-done{border-color:var(--pass-border);background:var(--pass-bg);}
.ct-row.ct-zero{border-color:var(--fail-border);background:var(--fail-bg);}
.ct-label{flex:1;font-size:16px;font-weight:700;}
.ct-input{width:80px;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-family:'Sarabun',sans-serif;font-size:17px;font-weight:700;text-align:center;outline:none;}
.ct-unit{font-size:13px;color:var(--muted);white-space:nowrap;}
.page{display:none;width:100%;}.page.active{display:block;}
</style>
</head>
<body>

<!-- HEADER ทั่วไปสำหรับหน้าถัดไป -->
<div class="header" id="standardHeader" style="display:none;">
  <div class="header-top">
    <div class="header-left-title" id="headerLeftTitle">ISUZU FRG</div>
    <div class="header-right-title" id="headerRightTitle">เลือก Group</div>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
</div>

<!-- PAGE 0: หน้าแรกเลือกวันที่และกะ -->
<div class="page active" id="page-init">
  <div style="background:var(--red); color:#fff; padding:24px 16px; width:100%;">
    <div class="init-hero">ISUZU FRG</div>
    <div class="init-hero-sub">เริ่มต้นใช้งาน</div>
    <div class="init-hero-title">Worker — ตรวจสอบ</div>
    <div class="init-hero-desc">กรุณาเลือกวันที่และกะทำงาน</div>
  </div>

  <div class="section">
    <div class="section-title">กำหนดข้อมูลการทำงาน</div>
    
    <div class="field-card" style="margin-bottom: 14px;">
      <label>วันที่ปฏิบัติงาน</label>
      <input type="date" id="initDate">
    </div>
    
    <div class="field-card" style="margin-bottom: 20px;">
      <label>กะทำงาน (SHIFT)</label>
      <select id="initShift" required>
        <option value="" disabled selected>-- เลือกกะทำงาน --</option>
        <option value="A">SHIFT A</option>
        <option value="B">SHIFT B</option>
      </select>
    </div>
    
    <button class="submit-btn" onclick="startInspection()">ถัดไป: เลือก Group →</button>
  </div>
</div>

<!-- PAGE 1: เลือก Group -->
<div class="page" id="page-group">
  <div class="section">
    <div class="section-title">เลือก Group</div>
    <div class="grid" id="groupGrid"></div>
  </div>
</div>

<!-- PAGE 2: เลือกประเภทหลัก -->
<div class="page" id="page-type">
  <div class="section">
    <div class="section-title">เลือกประเภทรายการตรวจสอบ</div>
    <div class="grid" id="typeGrid"></div>
  </div>
</div>

<!-- PAGE 3: เลือก Stage -->
<div class="page" id="page-stage">
  <div class="section">
    <div class="section-title">เลือก Stage</div>
    <div class="grid" id="stageGrid"></div>
  </div>
</div>

<!-- PAGE 4: เลือกรายละเอียดย่อย -->
<div class="page" id="page-subtype">
  <div class="section">
    <div class="section-title">เลือกรายละเอียดย่อย</div>
    <div class="subtype-row" id="subtypeRow"></div>
  </div>
</div>

<!-- PAGE 5: กรอกแบบฟอร์ม -->
<div class="page" id="page-form">
  <div class="progress-wrap">
    <div class="progress-bg"><div class="progress-fill" id="pFill"></div></div>
    <div class="progress-label" id="pLabel">ตรวจแล้ว 0 / 0 รายการ</div>
  </div>
  <div class="section">
    <div class="section-title">หัวข้อตรวจสอบ</div>
    <div class="check-list" id="checkList"></div>
  </div>
  <div class="section">
    <div class="section-title">หมายเหตุ (ถ้ามี)</div>
    <div class="field-card">
      <label>บันทึกเพิ่มเติม</label>
      <textarea id="remarkText" placeholder="สิ่งผิดปกติ, แจ้งซ่อม..."></textarea>
    </div>
  </div>
  <div class="section">
    <div class="section-title">ลงชื่อผู้ตรวจ</div>
    <div class="field-card">
      <label>ชื่อ-สกุล Worker</label>
      <input type="text" id="workerName" placeholder="พิมพ์ชื่อ-สกุล..." style="color:var(--text); font-weight:normal;">
    </div>
  </div>
  <button class="submit-btn" onclick="submitWorker()">ส่งให้ Foreman อนุมัติ →</button>
</div>

<!-- SUCCESS -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">ส่งสำเร็จแล้ว!</div>
  <div class="success-sub">รอ Foreman เข้ามาตรวจสอบและอนุมัติ</div>
  <div class="success-info" id="successInfo"></div>
  <button class="reset-btn" onclick="resetForm()">+ ตรวจรอบถัดไป (Stage เดิม)</button>
  <button class="home-btn" onclick="goHome()">🏠 กลับหน้าหลัก</button>
</div>

<!-- แถบปุ่มย้อนกลับด้านล่างซ้าย และปุ่มลัดไปเลือกประเภทด้านขวา -->
<div class="bottom-nav-bar" id="bottomNavBar" style="display:none;">
  <button class="bnav-btn" onclick="goBack()">← ย้อนกลับ</button>
  <button class="bnav-btn primary" id="shortcutTypeBtn" onclick="goToTypes()" style="display:none;">📋 ไปหน้าเลือกประเภท</button>
</div>

<div class="toast" id="toast"></div>

async function backgroundFetchSharedStatus() {
  try {
    const res = await fetch(SHEETS_URL + "?t=" + Date.now());
    const data = await res.json();
    
    sharedStatusMap = {};
    const heldList = JSON.parse(localStorage.getItem("isuzu_held_" + nav.date) || "[]");
    const localSubs = JSON.parse(localStorage.getItem("isuzu_submissions") || "[]");
    const allRows = [];
    
    if (data.result === "success" && data.rows) {
      data.rows.forEach(r => {
        let j = {};
        try { j = JSON.parse(r["JSON เต็ม"] || "{}"); } catch(e){}
        allRows.push({
          id: r["ID"] || j.id,
          date: String(r["วันที่"]||j.date||"").split("T")[0],
          shift: String(r["กะ"]||j.shift||"").trim(),
          group: String(r["Group"]||j.group||"").trim(),
          stage: String(r["Stage"]||j.stage||"").trim(),
          status: String(r["สถานะ"]||r["status"]||j.status||"").trim().toLowerCase(),
          checks: j.checks || []
        });
      });
    }
    
    localSubs.forEach(l => allRows.push({
      id: l.id,
      date: String(l.date||"").split("T")[0],
      shift: String(l.shift||"").trim(),
      group: String(l.group||"").trim(),
      stage: String(l.stage||"").trim(),
      status: String(l.status||"").trim().toLowerCase(),
      checks: l.checks || []
    }));

    allRows.forEach(row => {
      if (row.date === nav.date && row.shift === nav.shift) {
        let rGroup = row.group;
        let rStage = row.stage;
        let rStatus = row.status;
        let hasFail = (row.checks || []).some(c => c.result === "fail");
        let isHeld = heldList.includes(row.id);

        Object.keys(STATION_DATA[rGroup] || {}).forEach(typeKey => {
          const stages = STATION_DATA[rGroup][typeKey].stages;
          Object.entries(stages).forEach(([baseStage, subs]) => {
            if (subs && subs.length > 0) {
              subs.forEach(sub => {
                if (rStage.toUpperCase() === (baseStage + "-" + sub).toUpperCase()) {
                  if (!sharedStatusMap[rGroup]) sharedStatusMap[rGroup] = {};
                  if (!sharedStatusMap[rGroup][baseStage]) sharedStatusMap[rGroup][baseStage] = {};
                  
                  if (isHeld) {
                    sharedStatusMap[rGroup][baseStage][sub] = "warn";
                  } else if (rStatus === "approved" && hasFail) {
                    sharedStatusMap[rGroup][baseStage][sub] = "fail";
                  } else if (hasFail) {
                    sharedStatusMap[rGroup][baseStage][sub] = "fail";
                  } else if (rStatus === "approved" || rStatus === "pending") {
                    sharedStatusMap[rGroup][baseStage][sub] = "pass";
                  }
                }
              });
            } else {
              if (rStage.toUpperCase() === baseStage.toUpperCase()) {
                if (!sharedStatusMap[rGroup]) sharedStatusMap[rGroup] = {};
                if (!sharedStatusMap[rGroup][baseStage]) sharedStatusMap[rGroup][baseStage] = {};
                
                if (isHeld) {
                  sharedStatusMap[rGroup][baseStage]["_DEFAULT_"] = "warn";
                } else if (rStatus === "approved" && hasFail) {
                  sharedStatusMap[rGroup][baseStage]["_DEFAULT_"] = "fail";
                } else if (hasFail) {
                  sharedStatusMap[rGroup][baseStage]["_DEFAULT_"] = "fail";
                } else if (rStatus === "approved" || rStatus === "pending") {
                  sharedStatusMap[rGroup][baseStage]["_DEFAULT_"] = "pass";
                }
              }
            }
          });
        });
      }
    });

    const activePage = document.querySelector(".page.active");
    if (activePage && activePage.id === "page-stage") {
      renderStages();
    } else if (activePage && activePage.id === "page-type") {
      renderTypes();
    }
  } catch (e) {
    console.log("Fetch shared status error:", e);
  }
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const targetPage = document.getElementById("page-"+id);
  if(targetPage) targetPage.classList.add("active");
  document.getElementById("successScreen").classList.remove("show");
  document.getElementById("page-form").style.display = (id === "form") ? "block" : "";
  
  const standardHeader = document.getElementById("standardHeader");
  const topActionRow = document.getElementById("topActionRow");
  const shortcutBtn = document.getElementById("shortcutTypeBtn");
  
  if (id === "init") {
    standardHeader.style.display = "none";
    topActionRow.style.display = "none";
  } else {
    standardHeader.style.display = "block";
    topActionRow.style.display = "flex";
    if (id === "stage" || id === "subtype" || id === "form") {
      shortcutBtn.style.display = "block";
    } else {
      shortcutBtn.style.display = "none";
    }
  }
  window.scrollTo(0,0);
}

function updateHeader(){
  const leftTitle = document.getElementById("headerLeftTitle");
  const rightTitle = document.getElementById("headerRightTitle");
  const bc = document.getElementById("breadcrumb");

  if(!nav.group){
    leftTitle.textContent = `ISUZU FRG\nGroup ${nav.group || '—'} · SHIFT ${nav.shift || '—'}`;
    rightTitle.textContent = "เลือก Group";
    bc.innerHTML = "";
  } else if(!nav.type){
    leftTitle.textContent = `ISUZU FRG\nGroup ${nav.group} · SHIFT ${nav.shift}`;
    rightTitle.textContent = "เลือกประเภทตรวจสอบ";
    bc.innerHTML = `<span>Group ${nav.group}</span>`;
  } else if(!nav.stage){
    const typeLabel = TYPE_META[nav.type]?.label || nav.type;
    leftTitle.textContent = `ISUZU FRG\nGroup ${nav.group} · SHIFT ${nav.shift}`;
    rightTitle.textContent = "เลือก Stage";
    bc.innerHTML = `<span>Group ${nav.group}</span> › <span>${typeLabel}</span>`;
  } else if(getSubtypes().length && !nav.subtype && !isContactTip()){
    const typeLabel = TYPE_META[nav.type]?.label || nav.type;
    leftTitle.textContent = `ISUZU FRG\nGroup ${nav.group} · SHIFT ${nav.shift}`;
    rightTitle.textContent = "เลือกรายละเอียดย่อย";
    bc.innerHTML = `<span>Group ${nav.group}</span> › <span>${typeLabel}</span> › <span>${nav.stage}</span>`;
  } else {
    const typeLabel = TYPE_META[nav.type]?.label || nav.type;
    const fullName = nav.stage + (nav.subtype ? " ("+nav.subtype+")" : "");
    leftTitle.textContent = `ISUZU FRG\nGroup ${nav.group} · SHIFT ${nav.shift}`;
    rightTitle.textContent = "กรอกผลตรวจ";
    bc.innerHTML = `Group ${nav.group} › ${typeLabel} › ${fullName}`;
  }
}

function getSubtypes(){
  if(!nav.group || !nav.type || !nav.stage) return [];
  return STATION_DATA[nav.group][nav.type]?.stages[nav.stage] || [];
}

function goToTypes(){
  nav.type = null;
  nav.stage = null;
  nav.subtype = null;
  updateHeader();
  renderTypes();
  showPage("type");
}

function goBack(){
  const activePage = document.querySelector(".page.active");
  if(activePage && activePage.id === "page-form") {
    if(isContactTip()) {
      nav.stage = null; nav.subtype = null; updateHeader(); renderStages(); showPage("stage");
    } else if(getSubtypes().length) {
      nav.subtype = null; updateHeader(); renderSubtypes(); showPage("subtype");
    } else {
      nav.stage = null; nav.subtype = null; updateHeader(); renderStages(); showPage("stage");
    }
  } else if(nav.subtype !== null && getSubtypes().length && !isContactTip()){ 
    nav.subtype=null; updateHeader(); renderSubtypes(); showPage("subtype"); 
  } else if(nav.stage){ 
    nav.stage=null; nav.subtype=null; updateHeader(); renderStages(); showPage("stage"); 
  } else if(nav.type){ 
    nav.type=null; nav.stage=null; updateHeader(); renderTypes(); showPage("type"); 
  } else if(nav.group){ 
    nav.group=null; updateHeader(); showPage("group"); 
  } else if(activePage && activePage.id === "page-group") {
    showPage("init");
  }
}

function renderGroups(){
  const grid = document.getElementById("groupGrid");
  grid.innerHTML="";
  Object.keys(STATION_DATA).forEach(g=>{
    const typeCount = Object.keys(STATION_DATA[g]).length;
    const el=document.createElement("div");
    el.className="nav-card";
    el.innerHTML=`<div class="nav-icon">🏭</div><div class="nav-info"><div class="nav-title">Group ${g}</div><div class="nav-sub">${typeCount} ประเภทรายการตรวจ</div></div><div class="nav-arrow">›</div>`;
    el.onclick=()=>{ 
      nav.group=g; 
      updateHeader(); 
      renderTypes(); 
      showPage("type"); 
    };
    grid.appendChild(el);
  });
}

function renderTypes(){
  const grid = document.getElementById("typeGrid");
  grid.innerHTML="";
  const types = STATION_DATA[nav.group];
  const groupStatusMap = sharedStatusMap[nav.group] || {};

  Object.entries(types).forEach(([typeKey, typeData]) => {
    const stages = typeData.stages;
    let totalUnits = 0;
    let doneUnits = 0;
    let allCompleted = true;

    const isRobotType = (typeKey === "FANUC" || typeKey === "YASKAWA");

    Object.entries(stages).forEach(([stageName, subs]) => {
      const doneSubs = groupStatusMap[stageName] || {};
      if (subs && subs.length > 0 && typeKey !== "CONTACT_TIP") {
        subs.forEach(sub => {
          totalUnits++;
          if (doneSubs[sub] === "pass") doneUnits++;
          else allCompleted = false;
        });
      } else {
        totalUnits++;
        if (doneSubs["_DEFAULT_"] === "pass") doneUnits++;
        else allCompleted = false;
      }
    });

    const el = document.createElement("div");
    el.className = "nav-card" + (allCompleted ? " completed-type" : "");

    let countText = "";
    if (isRobotType) {
      countText = `${doneUnits}/${totalUnits} Unit`;
    } else {
      const totalStages = Object.keys(stages).length;
      let doneStagesCount = 0;
      Object.entries(stages).forEach(([stageName, subs]) => {
        const doneSubs = groupStatusMap[stageName] || {};
        if (subs && subs.length > 0 && typeKey !== "CONTACT_TIP") {
          if (subs.every(s => doneSubs[s] === "pass")) doneStagesCount++;
        } else {
          if (doneSubs["_DEFAULT_"] === "pass") doneStagesCount++;
        }
      });
      countText = `${doneStagesCount}/${totalStages} Station`;
    }

    el.innerHTML=`
      <div class="nav-icon">${TYPE_ICONS[typeKey]||"📋"}</div>
      <div class="nav-info">
        <div class="nav-title">${typeData.label}</div>
      </div>
      <div class="badge-status ${allCompleted ? 'badge-pass' : ''}" style="${allCompleted ? '' : 'color:var(--muted); background:#F3F4F6; border:1px solid var(--border);'}">
        ${countText} ${allCompleted ? '✓' : ''}
      </div>
    `;

    el.onclick=()=>{ 
      nav.type=typeKey; 
      updateHeader(); 
      renderStages();
      showPage("stage");
    };
    grid.appendChild(el);
  });
}

function renderStages(){
  const grid = document.getElementById("stageGrid");
  grid.innerHTML="";
  const stages = STATION_DATA[nav.group][nav.type].stages;
  const groupStatusMap = sharedStatusMap[nav.group] || {};

  Object.entries(stages).forEach(([stageName, subtypes]) => {
    const el=document.createElement("div");
    const doneSubs = groupStatusMap[stageName] || {};
    
    let stageClass = "";
    let badgeHtml = '<div class="nav-arrow">›</div>';
    let subInfo = (subtypes.length && !isContactTip()) ? `${subtypes.length} รายละเอียดย่อย` : "รายการตรวจพื้นฐาน";

    if (subtypes && subtypes.length > 0 && !isContactTip()) {
      const allDone = subtypes.every(sub => doneSubs[sub] === "pass");
      const hasFail = subtypes.some(sub => doneSubs[sub] === "fail");
      const hasWarn = subtypes.some(sub => doneSubs[sub] === "warn");

      if (hasFail) {
        stageClass = " fail-stage";
        badgeHtml = '<div class="badge-status badge-fail">พบปัญหา</div>';
      } else if (hasWarn) {
        stageClass = " warn-stage";
        badgeHtml = '<div class="badge-status badge-warn">รอแก้ไข</div>';
      } else if (allDone) {
        stageClass = " completed-stage";
        badgeHtml = '<div class="badge-status badge-pass">ตรวจครบ</div>';
      }
    } else {
      const status = doneSubs["_DEFAULT_"];
      if (status === "fail") {
        stageClass = " fail-stage";
        badgeHtml = '<div class="badge-status badge-fail">พบปัญหา</div>';
      } else if (status === "warn") {
        stageClass = " warn-stage";
        badgeHtml = '<div class="badge-status badge-warn">รอแก้ไข</div>';
      } else if (status === "pass") {
        stageClass = " completed-stage";
        badgeHtml = '<div class="badge-status badge-pass">ตรวจครบ</div>';
      }
    }

    el.className = "nav-card" + stageClass;
    el.innerHTML=`
      <div class="nav-icon">${stageClass.includes("completed") ? "✅" : stageClass.includes("fail") ? "❌" : stageClass.includes("warn") ? "⚠️" : "📍"}</div>
      <div class="nav-info">
        <div class="nav-title">${stageName}</div>
        <div class="nav-sub">${subInfo}</div>
      </div>
      ${badgeHtml}
    `;

    el.onclick=()=>{
      nav.stage=stageName; nav.subtype=null;
      updateHeader();
      
      if(isContactTip()){ 
        initForm(); showPage("form"); return; 
      }
      
      const subs = getSubtypes();
      if(subs.length){ renderSubtypes(); showPage("subtype"); }
      else { initForm(); showPage("form"); }
    };
    grid.appendChild(el);
  });
}

function renderSubtypes(){
  const row = document.getElementById("subtypeRow");
  row.innerHTML="";
  const groupStatusMap = sharedStatusMap[nav.group] || {};
  const doneSubs = groupStatusMap[nav.stage] || {};

  getSubtypes().forEach(sub=>{
    const status = doneSubs[sub];
    let css = "";
    let icon = "🔹";
    let labelExtra = "";

    if (status === "pass") {
      css = " completed-sub"; icon = "✅"; labelExtra = " (ผ่าน)";
    } else if (status === "fail") {
      css = " fail-sub"; icon = "❌"; labelExtra = " (ไม่ผ่าน)";
    } else if (status === "warn") {
      css = " warn-sub"; icon = "⚠️"; labelExtra = " (รอแก้ไข)";
    }

    const chip=document.createElement("div");
    chip.className = "subtype-chip" + css;
    chip.innerHTML = `<span>${icon}</span><span>${sub}${labelExtra}</span>`;
    chip.onclick=()=>{ nav.subtype=sub; updateHeader(); initForm(); showPage("form"); };
    row.appendChild(chip);
  });
}

function isContactTip(){ return nav.type === "CONTACT_TIP"; }
function getContactTipItems(){ return STATION_DATA[nav.group]["CONTACT_TIP"].stages[nav.stage] || []; }

function initForm(){
  if(isContactTip()){
    currentChecks = []; checkState = {};
    getContactTipItems().forEach(w=>{ checkState[w] = null; });
  } else {
    currentChecks = CHECKS_BY_TYPE[nav.type] || DEFAULT_CHECKS;
    checkState={};
    currentChecks.forEach(c=>{ checkState[c.id]={result:null,comment:"",value:""}; });
  }
  renderChecks();
}

function renderChecks(){
  const list=document.getElementById("checkList");
  list.innerHTML="";

  if(isContactTip()){
    const items = getContactTipItems();
    if(!items.length){
      list.innerHTML=`<div style="text-align:center;color:var(--muted);padding:24px;">ไม่พบรายการ W สำหรับ Stage นี้</div>`;
      return;
    }
    const header = document.createElement("div");
    header.style.cssText="font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;";
    header.textContent="กดเลือกสถานะของแต่ละ Contact Tip";
    list.appendChild(header);

    items.forEach(w=>{
      const val = checkState[w];
      const isDone = val !== null && val !== "";
      const isZero = isDone && parseInt(val) === 0;
      const row = document.createElement("div");
      row.className="ct-row" + (isDone && !isZero ? " ct-done" : isZero ? " ct-zero" : "");
      row.setAttribute("data-ct", w);
      row.innerHTML=`
        <div class="ct-label">🔌 ${w}</div>
        <input type="number" inputmode="numeric" min="0" placeholder="จำนวน"
          class="ct-input" value="${val !== null ? val : ""}"
          oninput="setCTVal('${w}', this.value)"
          onblur="setCTVal('${w}', this.value)">
        <span class="ct-unit">ครั้ง<br><span style="font-size:12px;color:var(--muted);">(0=ไม่เปลี่ยน)</span></span>
      `;
      list.appendChild(row);
    });
    updateProgress();
    return;
  }

  currentChecks.forEach(c=>{
    const s=checkState[c.id];
    const div=document.createElement("div");
    div.className="check-item"+(s.result==="pass"?" pass":s.result==="fail"?" fail":"");
    div.setAttribute("data-id", c.id);

    const numericRow = c.numeric ? `
      <div class="comment-row" style="display:flex;align-items:center;gap:10px;margin-top:10px;margin-bottom:0;">
        <input type="number" inputmode="decimal" placeholder="ค่าที่วัดได้ (${c.min}-${c.max})"
          style="flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-family:'Sarabun',sans-serif;font-size:15px;outline:none;"
          value="${s.value||""}" oninput="setV(${c.id},this.value)">
        <span style="font-size:14px;color:var(--muted);min-width:45px;font-weight:600;">${c.unit||""}</span>
      </div>` : "";

    const toggleOrStatus = c.numeric
      ? `<div class="numeric-status" style="flex-shrink:0;margin-top:2px;">
           ${s.result==="pass"?'<span style="font-size:13px;font-weight:700;color:var(--pass);background:var(--pass-bg);border-radius:6px;padding:6px 12px;">✓ ผ่าน</span>'
             :s.result==="fail"?'<span style="font-size:13px;font-weight:700;color:var(--red);background:var(--fail-bg);border-radius:6px;padding:6px 12px;">✗ ไม่ผ่าน</span>'
             :'<span style="font-size:13px;color:var(--muted);font-weight:600;">รอกรอกค่า</span>'}
         </div>`
      : `<div class="toggle-group">
           <button class="tbtn ${s.result==="pass"?"ap":""}" onclick="setR(${c.id},'pass')">O</button>
           <button class="tbtn ${s.result==="fail"?"af":""}" onclick="setR(${c.id},'fail')">✗</button>
         </div>`;

    div.innerHTML=`
      <div class="check-top">
        <span class="check-num">${c.id}</span>
        <div class="check-info">
          <div class="check-name">${c.name}</div>
          <div class="check-std">${c.standard}</div>
        </div>
        ${toggleOrStatus}
      </div>
      ${numericRow}
      <div class="comment-row comment-fail-box" id="commentBox_${c.id}" style="display:${s.result==="fail"?"block":"none"};">
        <textarea placeholder="ระบุสิ่งที่พบ / แจ้งหัวหน้าแล้วหรือยัง..." oninput="setC(${c.id},this.value)">${s.comment||""}</textarea>
      </div>
    `;
    list.appendChild(div);
  });
  updateProgress();
}

function setCTVal(w, val){
  checkState[w] = val === "" ? null : val;
  const row = document.querySelector(`.ct-row[data-ct="${w}"]`);
  if(row){
    row.classList.remove("ct-done","ct-zero");
    if(val !== "" && val !== null){
      row.classList.add(parseInt(val) === 0 ? "ct-zero" : "ct-done");
    }
  }
  updateProgress();
}

function setR(id,v){ checkState[id].result=checkState[id].result===v?null:v;if(checkState[id].result!=="fail")checkState[id].comment="";renderChecks();}
function setC(id,v){checkState[id].comment=v;}

function setV(id,v){
  checkState[id].value = v;
  const c = currentChecks.find(x=>x.id===id);
  if(c && c.numeric){
    if(v===""){ checkState[id].result = null; } 
    else {
      const num = parseFloat(v);
      checkState[id].result = (!isNaN(num) && num>=c.min && num<=c.max) ? "pass" : "fail";
    }
    if(checkState[id].result!=="fail") checkState[id].comment="";
  }
  updateNumericStatusUI(id);
  updateProgress();
}

function updateNumericStatusUI(id){
  const item = document.querySelector(`.check-item[data-id="${id}"]`);
  if(!item) return;
  const s = checkState[id];
  item.classList.remove("pass","fail");
  if(s.result==="pass") item.classList.add("pass");
  if(s.result==="fail") item.classList.add("fail");

  const statusBox = item.querySelector(".numeric-status");
  if(statusBox){
    if(s.result==="pass"){
      statusBox.innerHTML = '<span style="font-size:13px;font-weight:700;color:var(--pass);background:var(--pass-bg);border-radius:6px;padding:6px 12px;">✓ ผ่าน</span>';
    } else if(s.result==="fail"){
      statusBox.innerHTML = '<span style="font-size:13px;font-weight:700;color:var(--red);background:var(--fail-bg);border-radius:6px;padding:6px 12px;">✗ ไม่ผ่าน</span>';
    } else {
      statusBox.innerHTML = '<span style="font-size:13px;color:var(--muted);font-weight:600;">รอกรอกค่า</span>';
    }
  }
  const cBox = document.getElementById(`commentBox_${id}`);
  if(cBox) cBox.style.display = (s.result === "fail") ? "block" : "none";
}

function updateProgress(){
  let total, done;
  if(isContactTip()){
    const items = getContactTipItems();
    total = items.length;
    done = items.filter(w=>checkState[w]!==null && checkState[w]!=="").length;
  } else {
    total = currentChecks.length;
    done = Object.values(checkState).filter(s=>s.result!==null).length;
  }
  document.getElementById("pFill").style.width=(total?done/total*100:0)+"%";
  document.getElementById("pLabel").textContent=`ตรวจแล้ว ${done} / ${total} รายการ`;
}

function buildFullStageName(){
  if(!nav.subtype) return nav.stage;
  return nav.stage + "-" + nav.subtype;
}

function submitWorker(){
  const worker=document.getElementById("workerName").value.trim();
  const date=nav.date;
  const shift=nav.shift;

  let undoneCount = 0;
  if(isContactTip()){
    undoneCount = getContactTipItems().filter(w=>checkState[w]===null || checkState[w]==="").length;
  } else {
    undoneCount = currentChecks.filter(c=>checkState[c.id].result===null).length;
  }
  if(undoneCount>0){showToast("ยังตรวจไม่ครบ "+undoneCount+" รายการ","err");return;}
  if(!worker){showToast("กรุณาใส่ชื่อ Worker","err");return;}

  const typeLabel = TYPE_META[nav.type]?.label || nav.type;
  const fullStage = buildFullStageName();

  const entry={
    id:"W"+Date.now(),
    timestamp_worker:new Date().toISOString(),
    timestamp_foreman:null,
    date,shift,
    group:nav.group,
    type:nav.type, 
    type_label:typeLabel,
    stage:fullStage, 
    stage_base:nav.stage, 
    subtype:nav.subtype,
    worker, foreman:null,
    remark:document.getElementById("remarkText").value.trim(),
    checks: isContactTip()
      ? getContactTipItems().map(w=>({id:w, name:"CONTACT TIP "+w, result:parseInt(checkState[w])>0?"pass":"fail", comment:"", value:checkState[w]||"0"}))
      : currentChecks.map(c=>({id:c.id,name:c.name,result:checkState[c.id].result,comment:checkState[c.id].comment,value:checkState[c.id].value||""})),
    status:"pending"
  };

  const all=JSON.parse(localStorage.getItem("isuzu_submissions")||"[]");
  all.push(entry);
  localStorage.setItem("isuzu_submissions",JSON.stringify(all));

  const hasFail = entry.checks.some(c => c.result === "fail");
  const subKey = nav.subtype ? nav.subtype : "_DEFAULT_";
  if(!sharedStatusMap[nav.group]) sharedStatusMap[nav.group] = {};
  if(!sharedStatusMap[nav.group][nav.stage]) sharedStatusMap[nav.group][nav.stage] = {};
  sharedStatusMap[nav.group][nav.stage][subKey] = hasFail ? "fail" : "pass";

  fetch(SHEETS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(entry)
  }).catch(e => console.error(e));

  const failC=entry.checks.filter(c=>c.result==="fail").length;
  const totalC=entry.checks.length;
  
  let displayDate = date;
  if (date && date.includes("-")) {
    let p = date.split("-");
    if (p.length === 3) displayDate = p[2] + "/" + p[1] + "/" + (parseInt(p[0]) + 543);
  }
  
  document.getElementById("successInfo").innerHTML=`
    <b>Group:</b> ${nav.group} &nbsp;|&nbsp; <b>ประเภท:</b> ${typeLabel}<br>
    <b>Stage:</b> ${fullStage}<br>
    <b>วันที่:</b> ${displayDate} &nbsp;|&nbsp; <b>กะ:</b> SHIFT ${shift}<br>
    <b>Worker:</b> ${worker}<br>
    <b>ผล:</b> ผ่าน ${totalC-failC}/${totalC} รายการ${failC?`<br><span style="color:var(--red);font-weight:600;">⚠ ไม่ผ่าน ${failC} รายการ</span>`:""}
  `;
  document.getElementById("page-form").style.display="none";
  document.getElementById("successScreen").classList.add("show");
  window.scrollTo(0,0);
}

function resetForm(){
  document.getElementById("remarkText").value="";
  document.getElementById("successScreen").classList.remove("show");
  document.getElementById("page-form").style.display="none";
  initForm();
  showPage("form");
}

function showToast(msg,type=""){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className="toast show "+type;
  setTimeout(()=>t.className="toast",3000);
}
</script>
</body>
</html>
