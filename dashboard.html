<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ISUZU FRG — Office Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap');
:root{
  --red:#CC0000;--pass:#057A55;--pass-bg:#ECFDF5;--pass-border:#6EE7B7;
  --fail-bg:#FFF5F5;--fail-border:#FFBABA;--warn:#D97706;--warn-bg:#FFFBEB;--warn-border:#FCD34D;
  --bg:#F2F2F3;--card:#fff;--text:#111827;--muted:#6B7280;--border:#E5E7EB;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:16px;}

.header{background:var(--red);color:#fff;padding:10px 12px 12px;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.brand {font-size:16px;font-weight:900;letter-spacing:.04em;}
.brand-sub{font-size:10px;opacity:.8;display:inline-block;margin-left:6px;}
.live-wrap{text-align:right;}
.live-pill{display:flex;align-items:center;gap:4px;justify-content:flex-end;font-size:11px;font-weight:700;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.update-time{font-size:9px;opacity:.75;}
.header-date{font-size:11px;font-weight:600;opacity:.85;margin-top:2px;}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px 0;}
.sc{background:var(--card);border-radius:10px;padding:8px 4px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.sc-num{font-size:20px;font-weight:900;line-height:1;}
.sc-label{font-size:9px;color:var(--muted);font-weight:700;margin-top:2px;}
.sc-total .sc-num{color:#1A56DB;}.sc-pass .sc-num{color:var(--pass);}
.sc-fail .sc-num{color:var(--red);}.sc-wait .sc-num{color:#6B7280;}

.filter-bar{display:flex;gap:4px;padding:8px 10px 0;align-items:center;}
.fbtn{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);
  font-family:'Sarabun',sans-serif;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);white-space:nowrap;}
.fbtn.active{background:var(--red);border-color:var(--red);color:#fff;}
.date-input{border:1px solid var(--border);border-radius:6px;padding:4px 6px;
  font-family:'Sarabun',sans-serif;font-size:11px;outline:none;background:var(--card);flex:1;min-width:0;
  -webkit-appearance:none;appearance:none;}
.action-btns{display:flex;gap:4px;margin-left:auto;}
.export-btn{background:var(--pass);color:#fff;border:none;border-radius:6px;
  padding:5px 8px;font-family:'Sarabun',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.refresh-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:5px 8px;font-family:'Sarabun',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}

.refresh-info{display:flex;justify-content:space-between;align-items:center;padding:4px 10px 0;font-size:10px;color:var(--muted);}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px 0;}
.tc{background:var(--card);border-radius:12px;padding:10px 12px;cursor:pointer;
  border:1.5px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .15s;
  position:relative;display:flex;flex-direction:column;justify-content:space-between;}
.tc:active{transform:scale(.97);}
.tc.tc-pass{border-color:var(--pass-border);background:var(--pass-bg);}
.tc.tc-fail{border-color:var(--fail-border);background:var(--fail-bg);}
.tc.tc-warn{border-color:var(--warn-border);background:var(--warn-bg);}

.tc-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.tc-icon{font-size:18px;}
.tc-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.tc-bottom{display:flex;align-items:baseline;justify-content:space-between;margin-top:4px;}
.tc-ratio{font-size:22px;font-weight:900;line-height:1;}
.tc-pass .tc-ratio{color:var(--pass);}.tc-fail .tc-ratio{color:var(--red);}
.tc-warn .tc-ratio{color:var(--warn);}.tc .tc-ratio{color:#9CA3AF;}

.tc-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;white-space:nowrap;}
.tc-pass .tc-badge{background:var(--pass);color:#fff;}
.tc-fail .tc-badge{background:var(--red);color:#fff;}
.tc-warn .tc-badge{background:var(--warn);color:#fff;}
.tc .tc-badge{background:#E5E7EB;color:var(--muted);}

.fail-dot{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;
  border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;}

.alert-box{margin:6px 10px 0;background:var(--fail-bg);border:1px solid var(--fail-border);
  border-radius:8px;padding:6px 10px;}
.alert-title{font-size:11px;font-weight:700;color:var(--red);}
.alert-body{font-size:10px;color:var(--text);}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.drawer{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:640px;
  max-height:85vh;overflow-y:auto;padding-bottom:30px;}
.drawer-handle{width:36px;height:4px;background:#D1D5DB;border-radius:99px;margin:10px auto 0;}
.drawer-header{padding:10px 14px 8px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--card);z-index:1;}
.drawer-title{font-size:16px;font-weight:900;}
.drawer-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.drawer-close{float:right;background:none;border:none;font-size:24px;cursor:pointer;
  color:var(--muted);line-height:1;font-weight:bold;}

.group-row{margin:8px 14px 0;}
.group-label{font-size:11px;font-weight:800;text-transform:uppercase;
  color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.group-prog{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
.group-prog-fill{height:100%;background:var(--pass);border-radius:99px;}
.group-pct{font-size:10px;font-weight:700;color:var(--muted);}

.stage-list{display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.si{border-radius:10px;padding:8px 10px;border:1px solid var(--border);background:#FAFAFA;}
.si.si-pass{background:var(--pass-bg);border-color:var(--pass-border);cursor:pointer;}
.si.si-fail{background:var(--fail-bg);border-color:var(--fail-border);}
.si.si-pending{background:#FFFBEB;border-color:#FCD34D;}
.si-header{display:flex;align-items:center;gap:6px;}
.si-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dp{background:var(--pass);}.df{background:var(--red);}.dw{background:#D1D5DB;}.dy{background:#D97706;}
.si-name{font-size:13px;font-weight:700;flex:1;}
.si-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.tp{background:var(--pass);color:#fff;}.tf{background:var(--red);color:#fff;}.tw{background:#E5E7EB;color:var(--muted);}.ty{background:#D97706;color:#fff;}
.si-checks{margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,.07);}
.ck{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.ck.ck-fail{color:var(--red);font-weight:600;}
.ck-val{font-weight:700;}
.si-meta{font-size:10px;color:var(--muted);margin-top:4px;}

/* 💻 DESKTOP STYLES */
@media (min-width: 768px) {
  body { padding-bottom: 40px; }
  .header { padding: 16px 20px 18px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .brand { font-size: 20px; }
  .brand-sub { font-size: 11px; opacity: 0.7; margin-top: 1px; display: block; margin-left: 0; }
  .live-pill { font-size: 12px; gap: 5px; }
  .live-dot { width: 7px; height: 7px; }
  .update-time { font-size: 10px; opacity: 0.65; margin-top: 2px; }
  .header-date { font-size: 12px; opacity: 0.8; margin-top: 8px; }

  .summary { gap: 8px; padding: 12px 14px 0; }
  .sc { padding: 12px 8px; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .sc-num { font-size: 28px; }
  .sc-label { font-size: 10px; margin-top: 3px; }

  .filter-bar { gap: 6px; padding: 10px 14px 0; flex-wrap: wrap; }
  .fbtn { padding: 6px 14px; font-size: 13px; border-radius: 8px; border-width: 1.5px; }
  .date-input { padding: 6px 10px; font-size: 13px; border-radius: 8px; border-width: 1.5px; flex: initial; }
  .action-btns { gap: 6px; margin-left: auto; }
  .export-btn, .refresh-btn { padding: 6px 14px; font-size: 13px; border-radius: 8px; }

  .refresh-info { padding: 8px 14px 0; font-size: 12px; }

  .type-grid {
    display: flex; gap: 10px; padding: 12px 14px 0; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none; margin-top: 10px;
  }
  .type-grid::-webkit-scrollbar { display: none; }

  .tc {
    flex: 0 0 160px; min-width: 160px; padding: 18px 16px;
    border-radius: 16px; border-width: 2px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: block;
  }
  .tc-top { display: block; margin-bottom: 0; }
  .tc-icon { font-size: 24px; margin-bottom: 6px; }
  .tc-name { font-size: 13px; color: var(--muted); margin-bottom: 10px; white-space: normal; overflow: visible; }
  .tc-bottom { display: block; margin-top: 0; }
  .tc-ratio { font-size: 32px; margin-bottom: 8px; }
  .tc-badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; display: inline-flex; }
  .fail-dot { width: 22px; height: 22px; font-size: 11px; top: 12px; right: 12px; }

  .alert-box { margin: 10px 14px 0; padding: 10px 14px; border-radius: 12px; border-width: 1.5px; }
  .alert-title { font-size: 12px; margin-bottom: 3px; }
  .alert-body { font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <span class="brand">ISUZU FRG</span>
      <span class="brand-sub">Dashboard</span>
    </div>
    <div class="live-wrap">
      <div class="live-pill"><span class="live-dot"></span>LIVE</div>
      <div class="update-time" id="lastUpdate">--:--:--</div>
    </div>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="summary">
  <div class="sc sc-total"><div class="sc-num" id="sTotal">0</div><div class="sc-label">ทั้งหมด</div></div>
  <div class="sc sc-pass"><div class="sc-num" id="sPass">0</div><div class="sc-label">ผ่านแล้ว</div></div>
  <div class="sc sc-fail"><div class="sc-num" id="sFail">0</div><div class="sc-label">พบปัญหา</div></div>
  <div class="sc sc-wait"><div class="sc-num" id="sWait">0</div><div class="sc-label">รอตรวจ/อนุมัติ</div></div>
</div>

<div class="filter-bar">
  <button class="fbtn active" onclick="setShift('ALL',this)">ทั้งหมด</button>
  <button class="fbtn" onclick="setShift('A',this)">กะ A</button>
  <button class="fbtn" onclick="setShift('B',this)">กะ B</button>
  <input type="date" class="date-input" id="filterDate" onchange="renderDashboard()">
  <div class="action-btns">
    <button class="export-btn" onclick="exportCSV()">📥 Export</button>
    <button class="refresh-btn" onclick="refresh()">🔄</button>
  </div>
</div>

<div class="refresh-info">
  <span id="countdownText">รีเฟรชใน 30 วิ</span>
</div>

<div id="alertArea"></div>
<div class="type-grid" id="typeGrid"></div>

<!-- MODAL DRAWER -->
<div class="overlay" id="overlay" onclick="tryClose(event)">
  <div class="drawer" id="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <button class="drawer-close" onclick="closeModal()">×</button>
      <div class="drawer-title" id="drawerTitle">—</div>
      <div class="drawer-sub" id="drawerSub">—</div>
    </div>
    <div id="drawerBody"></div>
  </div>
</div>

function getAllStages(group,typeKey){
  const t=STATION_DATA[group]&&STATION_DATA[group][typeKey];
  if(!t) return [];
  const r=[];
  Object.entries(t.stages).forEach(([base,subs])=>{
    if(subs.length) subs.forEach(s=>r.push(base+"-"+s)); else r.push(base);
  });
  return r;
}

let countdownTimer;

document.getElementById("filterDate").value=todayDate.toISOString().split("T")[0];
document.getElementById("headerDate").textContent=

function getSubs(){return JSON.parse(localStorage.getItem("isuzu_submissions")||"[]");}

function parseRows(rows){
  return rows.map(row=>{
    let j=row["JSON เต็ม"]||"";
    let e = null;
    
    if(j && j!=="{}" && j!=="null"){
      try{ e=JSON.parse(j); }catch(err){}
    }
    
    if(!e || !e.stage || !e.group){
      e = {
        id: row["ID"] || ("id_" + Math.random().toString(36).substr(2, 9)),
        date: row["วันที่"] ? String(row["วันที่"]) : "",
        shift: row["กะ"] || "",
        group: row["Group"] || "",
        type: row["ประเภท"] || "",
        stage: row["Stage"] || "",
        worker: row["Worker"] || "",
        foreman: row["Foreman"] || "",
        status: row["สถานะ"] || "pending",
        timestamp_worker: row["Timestamp Worker"] || "",
        timestamp_foreman: row["Timestamp Foreman"] || "",
        proxy_by: row["อนุมัติแทนโดย"] || "",
        proxy_for_group: row["กลุ่มที่ทำแทน"] || "",
        remark: row["หมายเหตุ"] || "",
        checks: []
      };
    }
    
    if(e) {
      if(!e.foreman && row["Foreman"]) e.foreman = String(row["Foreman"]);
      let rawStatus = row["สถานะ"] ? String(row["สถานะ"]) : e.status;
      e.status = String(rawStatus || "pending").trim().toLowerCase();
      
      if(row["วันที่"]) e.date = String(row["วันที่"]);
      if(e.stage) e.stage = String(e.stage).trim();
      if(e.group) e.group = String(e.group).trim();
      if(row["ประเภท"]) e.type = String(row["ประเภท"]).trim();
    }
    return e;
  }).filter(Boolean);
}

async function syncFromSheets(){
  try{
    const r=await fetch(SHEETS_URL+"?t="+Date.now());
    const data=await r.json();
    if(data.result==="success"&&data.rows&&data.rows.length>0){
      const entries=parseRows(data.rows);
      if(entries.length>0){allSubs=entries;localStorage.setItem("isuzu_submissions",JSON.stringify(entries));}
    }
  }catch(e){
    console.log("Offline or error sync dashboard, using cache");
  }
  allSubs=getSubs();
}

function setShift(s,btn){
  currentShift=s;
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderDashboard();
}

function refresh(){
  syncFromSheets().then(()=>renderDashboard());
  resetCountdown();
}

function resetCountdown(){
  countdown=30;clearInterval(countdownTimer);
  countdownTimer=setInterval(()=>{
    countdown--;
    document.getElementById("countdownText").textContent=`รีเฟรชใน ${countdown} วิ`;
    if(countdown<=0) refresh();
  },1000);
}

function cleanDateStr(str) {
  if(!str) return "";
  let clean = str.split("T")[0].trim();
  let parts = clean.includes("/") ? clean.split("/") : clean.split("-");
  if(parts.length !== 3) return clean;
  
  let year, month, day;
  if(parts[0].length === 4) {
    year = parseInt(parts[0]);
    month = parts[1].padStart(2, '0');
    day = parts[2].padStart(2, '0');
  } else {
    year = parseInt(parts[2]);
    if(parseInt(parts[0]) > 12) {
      day = parts[0].padStart(2, '0');
      month = parts[1].padStart(2, '0');
    } else {
      month = parts[0].padStart(2, '0');
      day = parts[1].padStart(2, '0');
    }
  }
  if(year > 2500) year = year - 543; 
  return `${year}-${month}-${day}`;
}

function renderDashboard(){
  const filterDateInput = document.getElementById("filterDate").value; 
  const targetDateCleaned = cleanDateStr(filterDateInput);

  document.getElementById("lastUpdate").textContent=
    new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

  const subs=allSubs.filter(s=>{
    const itemDateCleaned = cleanDateStr(s.date);
    const shiftOk = currentShift==="ALL"||s.shift===currentShift;
    return itemDateCleaned === targetDateCleaned && shiftOk;
  });

  const typeStats={};
  Object.keys(TYPE_META).forEach(k => {
    typeStats[k] = {total:0,pass:0,fail:0,wait:0};
  });

  let totalAll=0,passAll=0,failAll=0;
  const alerts=[];

  Object.keys(STATION_DATA).forEach(group=>{
    Object.entries(STATION_DATA[group]).forEach(([typeKey,typeData]) => {
      if(!typeStats[typeKey]) typeStats[typeKey]={total:0,pass:0,fail:0,wait:0};
      const stages=getAllStages(group,typeKey);
      
      stages.forEach(stage=>{
        totalAll++;typeStats[typeKey].total++;
        const stageSubs=subs.filter(s=>{
          const sTypeClean = String(s.type || "").replace(/[\s_]+/g, '').toUpperCase();
          const keyClean = String(typeKey).replace(/[\s_]+/g, '').toUpperCase();
          const labelClean = String(TYPE_META[typeKey]?.label || "").replace(/[\s_]+/g, '').toUpperCase();
          
          let cleanItemStage = String(s.stage || "").trim().toUpperCase().split("-").join("").split("_").join("").split(" ").join("").split(".").join("");
          let cleanTargetStage = String(stage || "").trim().toUpperCase().split("-").join("").split("_").join("").split(" ").join("").split(".").join("");
          
          return (cleanItemStage===cleanTargetStage || cleanItemStage.split("-")[0]===cleanTargetStage) && s.group===group && (sTypeClean === keyClean || sTypeClean === labelClean);
        });
        
        const sortedSubs = stageSubs.sort((a,b)=>new Date(b.timestamp_worker)-new Date(a.timestamp_worker));
        const anyDone=sortedSubs.length>0;
        
        if(anyDone){
          const currentStatus = String(sortedSubs[0].status || "pending").toLowerCase();
          const isApproved = (currentStatus === "approved");
          const anyFail = (sortedSubs[0].checks||[]).some(c=>c.result==="fail");
          
          if(anyFail && isApproved){
            typeStats[typeKey].fail++;failAll++;
          } else if(isApproved) {
            typeStats[typeKey].pass++;passAll++;
          } else {
            typeStats[typeKey].wait++;
          }
          
          if(anyFail && isApproved){
            const sub=sortedSubs[0];
            const failItems=(sub.checks||[]).filter(c=>c.result==="fail").map(c=>{
              let t=c.name;if(c.value)t+=" ["+c.value+"]";return t;
            });
            alerts.push({group,type:TYPE_META[typeKey]?.label||typeKey,stage,worker:sub.worker,failItems});
          }
        } else {
          typeStats[typeKey].wait++;
        }
      });
    });
  });

  document.getElementById("sTotal").textContent=totalAll;
  document.getElementById("sPass").textContent=passAll;
  document.getElementById("sFail").textContent=failAll;
  document.getElementById("sWait").textContent=totalAll-(passAll+failAll);

  const alertArea=document.getElementById("alertArea");
  if(alerts.length){
    alertArea.innerHTML=alerts.slice(0,5).map(a=>`
      <div class="alert-box">
        <div class="alert-title">⚠ ${a.type} — ${a.stage} (Group ${a.group})</div>
        <div class="alert-body">Worker: ${a.worker} · ปัญหา: ${a.failItems.join(", ")}</div>
      </div>`).join("")+(alerts.length>5?`<div style="text-align:center;font-size:10px;color:var(--red);padding:4px 0;font-weight:700;">และอีก ${alerts.length-5} รายการ...</div>`:"");
  } else alertArea.innerHTML="";

  const grid=document.getElementById("typeGrid");
  grid.innerHTML="";

  Object.keys(TYPE_META).forEach(typeKey=>{
    const st=typeStats[typeKey] || {total:0,pass:0,fail:0,wait:0};
    const meta=TYPE_META[typeKey];
    const done=st.pass+st.fail;
    let cls="",badge="";
    
    if(st.fail>0){cls="tc-fail";badge="⚠ พบปัญหา";}
    else if(done===st.total&&st.total>0){cls="tc-pass";badge="ผ่านครบ";}
    else if(done>0 || st.total - st.wait > 0){cls="tc-warn";badge="กำลังตรวจ";}
    else{badge="รอตรวจ";}

    const card=document.createElement("div");
    card.className="tc "+cls;
    card.innerHTML=`
      ${st.fail>0?`<div class="fail-dot">${st.fail}</div>`:""}
      <div class="tc-top">
        <div class="tc-icon">${meta.icon}</div>
        <div class="tc-name">${meta.label}</div>
      </div>
      <div class="tc-bottom">
        <div class="tc-ratio">${st.total - st.wait}/${st.total}</div>
        <div class="tc-badge">${badge}</div>
      </div>
    `;
    card.onclick=()=>openModal(typeKey,meta,subs);
    grid.appendChild(card);
  });
}

function openModal(typeKey,meta,subs){
  document.getElementById("drawerTitle").textContent=meta.icon+" "+meta.label;

  let totalPass=0,totalFail=0,totalAll=0;
  const bodyEl=document.getElementById("drawerBody");
  bodyEl.innerHTML="";

  Object.keys(STATION_DATA).forEach(group=>{
    if(!STATION_DATA[group][typeKey]) return;
    const stages=getAllStages(group,typeKey);
    if(!stages.length) return;

    let gPass=0,gFail=0;
    const stageResults=[];

    stages.forEach(stage=>{
      totalAll++;
      const stageSubs=subs.filter(s=>{
        const sTypeClean = String(s.type || "").replace(/[\s_]+/g, '').toUpperCase();
        const keyClean = String(typeKey).replace(/[\s_]+/g, '').toUpperCase();
        const labelClean = String(TYPE_META[typeKey]?.label || "").replace(/[\s_]+/g, '').toUpperCase();
        
        let cleanItemStage = String(s.stage || "").trim().toUpperCase().split("-").join("").split("_").join("").split(" ").join("").split(".").join("");
        let cleanTargetStage = String(stage || "").trim().toUpperCase().split("-").join("").split("_").join("").split(" ").join("").split(".").join("");
        
        return (cleanItemStage===cleanTargetStage || cleanItemStage.split("-")[0]===cleanTargetStage) && s.group===group && (sTypeClean === keyClean || sTypeClean === labelClean);
      });
      
      const sortedSubs = stageSubs.sort((a,b)=>new Date(b.timestamp_worker)-new Date(a.timestamp_worker));
      const anyDone=sortedSubs.length>0;
      
      let status="wait";
      if(anyDone){
        const currentStatus = String(sortedSubs[0].status || "pending").toLowerCase();
        const isApproved = (currentStatus === "approved");
        const anyFail = (sortedSubs[0].checks||[]).some(c=>c.result==="fail");
        
        if(anyFail && isApproved){status="fail";gFail++;totalFail++;}
        else if(isApproved){status="pass";gPass++;totalPass++;}
        else {status="pending";}
      }
      
      stageResults.push({stage,status,sub:sortedSubs[0]});
    });

    const grpEl=document.createElement("div");
    grpEl.className="group-row";
    const pct=stages.length>0?Math.round((gPass+gFail)/stages.length*100):0;
    const grpColor=gFail>0?"var(--red)":gPass+gFail===stages.length?"var(--pass)":"var(--warn)";
    grpEl.innerHTML=`
      <div class="group-label" style="margin-top:10px;">
        🏭 Group ${group}
        <div class="group-prog" style="margin: 0 8px;"><div class="group-prog-fill" style="width:${pct}%;background:${grpColor}"></div></div>
        <span class="group-pct">${gPass+gFail}/${stages.length}</span>
      </div>`;

    const listEl=document.createElement("div");
    listEl.className="stage-list";
    const sorted=[
      ...stageResults.filter(r=>r.status==="fail"),
      ...stageResults.filter(r=>r.status==="pending"),
      ...stageResults.filter(r=>r.status==="pass"),
      ...stageResults.filter(r=>r.status==="wait"),
    ];
    
    sorted.forEach((r, idx)=>{
      let cls="", dotCls="", tagCls="", tagTxt="";
      if(r.status==="pass"){
        cls="si-pass"; dotCls="dp"; tagCls="tp"; tagTxt="✓ ผ่าน";
      } else if(r.status==="fail"){
        cls="si-fail"; dotCls="df"; tagCls="tf"; tagTxt="⚠ ไม่ผ่าน";
      } else if(r.status==="pending"){
        cls="si-pending"; dotCls="dy"; tagCls="ty"; tagTxt="⏳ รออนุมัติ";
      } else {
        cls=""; dotCls="dw"; tagCls="tw"; tagTxt="รอตรวจ";
      }
      
      const si=document.createElement("div");
      si.className="si "+cls;
      const uniqueId = `si_detail_${group}_${typeKey}_${idx}`;
      const checks=r.sub?(r.sub.checks||[]):[];
      let checksHTML="";
      
      if(r.status!=="wait"){
        let displayFmName = (r.sub && r.sub.foreman) ? r.sub.foreman : "-";
        const dbKey = r.sub.group + "_" + r.sub.shift;
        if (MASTER_FOREMAN_MAP[dbKey]) { displayFmName = MASTER_FOREMAN_MAP[dbKey]; }
        
        let fmTimeString = "";
        if (r.sub.timestamp_foreman) {
          try {
            const dFm = new Date(r.sub.timestamp_foreman);
            fmTimeString = " (" + dFm.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"}) + ")";
          } catch(err){}
        }

        let fmDisplayLine = "";
        if(r.status==="pending") {
          fmDisplayLine = `<span style="color:var(--muted)">ยังไม่ได้อนุมัติ</span>`;
        } else if (r.sub.proxy_by) {
          fmDisplayLine = `✅ ${displayFmName} <span style="color:var(--warn); font-weight:700;">(แทนโดย ${r.sub.proxy_by} (${r.sub.proxy_for_group||""})${fmTimeString})</span>`;
        } else {
          fmDisplayLine = `✅ ${displayFmName}${fmTimeString}`;
        }

        let workerTimeString = "";
        if (r.sub.timestamp_worker) {
          try {
            const dWk = new Date(r.sub.timestamp_worker);
            workerTimeString = " (" + dWk.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"}) + ")";
          } catch(err){}
        }

        if(r.status==="fail" || r.status==="pending" || !checks.length) {
          checksHTML=`
            <div class="si-checks" id="${uniqueId}" style="display:block;">`+
              (checks.length ? checks.map(c=>`<div class="ck" style="${c.result ==="fail"?"color:var(--red); font-weight:600;":""}">
                <span>${c.name}</span>
                <span class="ck-val">${c.value?c.value+" · ":""}<span style="color:${c.result==="pass"?"var(--pass)":"var(--red)"}">${c.result==="pass"?"O":"✗"}</span></span>
              </div>`).join("") : `<div class="ck"><span>สถานะภาพรวมด่าน</span><span class="ck-val" style="color:var(--pass)">ส่งตรวจแล้ว</span></div>`)+
              `<div class="si-meta">👷 Worker: ${r.sub.worker||""}${workerTimeString}<br>👔 Foreman: ${fmDisplayLine}</div>`
            +`</div>`;
        } else {
          checksHTML=`
            <div class="si-checks" id="${uniqueId}" style="display:none;">`+
              checks.map(c=>`<div class="ck">
                <span>${c.name}</span>
                <span class="ck-val">${c.value?c.value+" · ":""}<span style="color:var(--pass)">O</span></span>
              </div>`).join("")+
              `<div class="si-meta">👷 Worker: ${r.sub.worker||""}${workerTimeString}<br>👔 Foreman: ${fmDisplayLine}</div>`
            +`</div>`;
            
          si.onclick = (e) => {
            e.stopPropagation();
            const detailBox = document.getElementById(uniqueId);
            if(detailBox) { detailBox.style.display = (detailBox.style.display === "none") ? "block" : "none"; }
          };
        }
      }
      
      si.innerHTML=`
        <div class="si-header">
          <div class="si-dot ${dotCls}"></div>
          <div class="si-name">${r.stage}</div>
          <div class="si-tag ${tagCls}">${tagTxt}</div>
        </div>${checksHTML}`;
      listEl.appendChild(si);
    });

    grpEl.appendChild(listEl);
    bodyEl.appendChild(grpEl);
  });

  document.getElementById("drawerSub").textContent=`${totalPass}/${totalAll} สถานีผ่านงาน · ${totalFail} สถานีมีปัญหา`;
  document.getElementById("overlay").classList.add("show");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow="";
}
function tryClose(e){if(e.target===document.getElementById("overlay"))closeModal();}

function exportCSV(){
  const dateVal=document.getElementById("filterDate").value;
  const subs=allSubs.filter(s=>cleanDateStr(s.date)===cleanDateStr(dateVal)&&String(s.status).toLowerCase()==="approved");
  if(!subs.length){alert("ไม่มีข้อมูล");return;}
  let csv="\uFEFF";
  csv+="วันที่,กะ,Group,ประเภท,Stage,Worker,Foreman,ผ่าน,ไม่ผ่าน,รายการไม่ผ่าน,หมายเหตุ\n";
  subs.forEach(s=>{
    const c=s.checks||[];
    const fn=c.filter(x=>x.result==="fail").map(x=>x.name).join("; ");
    csv+=`${s.date},${s.shift},${s.group},${s.type_label||s.type},${s.stage},${s.worker},${s.foreman||""},${c.filter(x=>x.result==="pass").length},${c.filter(x=>x.result==="fail").length},"${fn}","${(s.remark||"").replace(/"/g,"'")}"\n`;
  });
  const b=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`ISUZU_${dateVal}.csv`;a.click();
}

syncFromSheets().then(()=>renderDashboard());
resetCountdown();
</script>
