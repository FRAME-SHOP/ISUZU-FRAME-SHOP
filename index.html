<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISUZU — ระบบตรวจสอบ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Sarabun',sans-serif;
  background:#F0F0F0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* =========================
   HEADER
========================= */

.header{
  background:#CC0000;
  color:#FFFFFF;
  padding:18px 20px 20px;
}

.header-top{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.logo{
  font-size:28px;
  font-weight:800;
  letter-spacing:.06em;
  color:#FFFFFF;
}

.logo-sub{
  font-size:15px;
  font-weight:700;
  color:#FFFFFF;
  letter-spacing:.05em;
  text-shadow:0 1px 2px rgba(0,0,0,.16);
}

.subtitle{
  font-size:15px;
  font-weight:700;
  color:#FFFFFF;
  opacity:1;
  margin-top:6px;
  letter-spacing:.04em;
  text-shadow:0 1px 2px rgba(0,0,0,.16);
}

/* =========================
   MENU CARDS
========================= */

.cards{
  width:100%;
  max-width:960px;
  margin:0 auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:#FFFFFF;
  border-radius:16px;
  padding:20px 18px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  text-decoration:none;
  color:#1A1A1A;
  display:flex;
  align-items:center;
  gap:16px;
  border:1.5px solid #E5E7EB;
  transition:transform .15s,box-shadow .15s;
}

.card:hover{
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.card:active{
  transform:scale(.98);
}

.card-icon{
  font-size:38px;
  flex-shrink:0;
}

.card-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:3px;
}

.card-desc{
  font-size:13px;
  color:#6B7280;
  line-height:1.5;
}

.card-arrow{
  margin-left:auto;
  font-size:22px;
  color:#CC0000;
  flex-shrink:0;
  font-weight:700;
}

.card.worker{
  border-left:5px solid #CC0000;
}

.card.foreman{
  border-left:5px solid #D97706;
}

.card.dashboard{
  border-left:5px solid #057A55;
}

/* =========================
   FOOTER
========================= */

.footer{
  text-align:center;
  padding:20px 24px 24px;
  font-size:12px;
  color:#9CA3AF;
  margin-top:auto;
}

/* =========================
   DESKTOP
========================= */

@media (min-width:768px){

  .header{
    padding:22px 40px 24px;
  }

  .logo{
    font-size:34px;
  }

  .logo-sub{
    font-size:17px;
  }

  .subtitle{
    font-size:17px;
  }

  .cards{
    padding:18px 20px 24px;
  }

  .card{
    padding:22px 24px;
  }
}
</style>
</head>

<body>

<div class="header">

  <div class="header-top">
    <div class="logo">ISUZU</div>
    <div class="logo-sub">E-Check Sheet</div>
  </div>

  <div class="subtitle">
    FRAME SHOP
  </div>

</div>

<div class="cards">

  <a class="card worker" href="worker.html">

    <div class="card-icon">👷</div>

    <div>
      <div class="card-title">Worker — ตรวจสอบ</div>
      <div class="card-desc">
        เลือก Stage<br>
        กรอกผลการตรวจสอบประจำวัน
      </div>
    </div>

    <div class="card-arrow">›</div>

  </a>

  <a class="card foreman" href="foreman.html">

    <div class="card-icon">📋</div>

    <div>
      <div class="card-title">Foreman — อนุมัติ</div>
      <div class="card-desc">
        ใส่รหัสพนักงาน<br>
        ตรวจสอบและอนุมัติรายการ
      </div>
    </div>

    <div class="card-arrow">›</div>

  </a>

  <a class="card dashboard" href="dashboard.html">

    <div class="card-icon">📊</div>

    <div>
      <div class="card-title">Dashboard — Office</div>
      <div class="card-desc">
        ดูสถานะทุก Station<br>
        แบบ Real-time
      </div>
    </div>

    <div class="card-arrow">›</div>

  </a>

</div>

<div class="footer">
  ISUZU · ระบบตรวจสอบ Daily Check Sheet
</div>

</body>
</html>
